services:
  web:
    build: .
    env_file:
      - .env
    depends_on:
      cache:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
  cache:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
